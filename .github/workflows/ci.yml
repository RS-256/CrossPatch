name: Build Release Remapped

# `./gradlew buildReleaseRemapped` を実行し、生成された
# `build/libs/<mod.version>/remapped/*.jar` を「ファイルごとに 1 artifact」として出力する。
# <mod.version> は build 前に stonecutter.properties.toml から取得して output に出し、
# 以降は当該バージョンのディレクトリのみを参照する。
# 最後に GITHUB_STEP_SUMMARY へ jar ごとの SHA-256 / サイズ / artifact へのリンクを表で出力する。
# さらに release publish 時は、同じ jar を release asset として添付し、
# SHA-256 / サイズの表（jar は asset への直リンク）を release note 末尾へ追記する。

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

# 同一 ref の進行中ジョブはキャンセル（タグ push は除外して取りこぼし防止）
concurrency:
  group: build-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

permissions:
  contents: read

jobs:
  # 1) buildReleaseRemapped を一度だけ実行し、全 jar を staging artifact に上げる。
  #    さらに後続ジョブ用に matrix（jar 一覧）と checksums（サイズ/SHA-256）を出力する。
  build:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      matrix: ${{ steps.collect.outputs.matrix }}
      checksums: ${{ steps.collect.outputs.checksums }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # build 前に mod.version を取得して output 化する。
      # 以降のステップ／ジョブはこのバージョンのディレクトリだけを参照する。
      - name: Resolve mod version
        id: version
        run: |
          set -euo pipefail
          version=$(
            grep -E '^[[:space:]]*mod\.version[[:space:]]*=' stonecutter.properties.toml \
              | head -n1 \
              | sed -E 's/.*=[[:space:]]*"([^"]*)".*/\1/'
          )
          if [ -z "$version" ]; then
            echo "::error::Could not resolve mod.version from stonecutter.properties.toml" >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Resolved mod.version=$version"

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          # 26.1.2 が Java 25 を要求するため、リリース全体を JDK 25 でビルドする。
          java-version: "25"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build (./gradlew buildReleaseRemapped)
        run: |
          chmod +x ./gradlew
          ./gradlew buildReleaseRemapped --stacktrace

      - name: Collect jar metadata
        id: collect
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          jars=(build/libs/"$VERSION"/remapped/*.jar)
          if [ ${#jars[@]} -eq 0 ]; then
            echo "::error::No remapped jars found under build/libs/$VERSION/remapped/*.jar" >&2
            exit 1
          fi

          # matrix: 各 jar を 1 entry とする（後続 package ジョブが per-file artifact を作る）
          matrix=$(
            for f in "${jars[@]}"; do
              jq -n --arg jar "$(basename "$f")" --arg path "$f" \
                '{jar: $jar, path: $path, artifact: ($jar | rtrimstr(".jar"))}'
            done | jq -sc '{include: .}'
          )

          # checksums: jar 名 -> {size, sha256}
          checksums=$(
            for f in "${jars[@]}"; do
              jq -n \
                --arg name "$(basename "$f")" \
                --argjson size "$(stat -c %s "$f")" \
                --arg sha "$(sha256sum "$f" | cut -d' ' -f1)" \
                '{name: $name, size: $size, sha256: $sha}'
            done | jq -sc 'map({key: .name, value: {size: .size, sha256: .sha256}}) | from_entries'
          )

          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "checksums=$checksums" >> "$GITHUB_OUTPUT"
          echo "Found ${#jars[@]} jar(s): ${jars[*]}"

      # per-file artifact 化のため、いったん全 jar を内部 staging artifact に退避する。
      # （summary ジョブの最後で削除し、最終的には per-file artifact のみ残す）
      - name: Upload staging (all remapped jars)
        uses: actions/upload-artifact@v4
        with:
          name: _staging-all-remapped
          path: build/libs/${{ steps.version.outputs.version }}/remapped/*.jar
          retention-days: 1
          if-no-files-found: error

  # 2) jar ごとに 1 artifact を作成する（matrix で並列）。
  package:
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.build.outputs.matrix) }}
    steps:
      - name: Download built jars
        uses: actions/download-artifact@v4
        with:
          name: _staging-all-remapped
          path: staging

      - name: Stage single jar
        run: |
          set -euo pipefail
          file=$(find staging -type f -name "${{ matrix.jar }}" | head -n1)
          if [ -z "$file" ]; then
            echo "::error::jar not found in staging: ${{ matrix.jar }}" >&2
            exit 1
          fi
          mkdir -p dist
          cp "$file" "dist/${{ matrix.jar }}"

      - name: Upload ${{ matrix.jar }}
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.jar }}
          if-no-files-found: error

  # 3) release publish 時のみ実行。ビルドした jar を release asset として添付し、
  #    summary と同じ表（jar は release asset への直リンク）を release note 末尾に追記する。
  release:
    needs: [build, package]
    if: ${{ github.event_name == 'release' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # release asset のアップロードと release note の編集に必要
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      TAG: ${{ github.event.release.tag_name }}
      CHECKSUMS: ${{ needs.build.outputs.checksums }}
    steps:
      # build ジョブが上げた staging artifact（全 remapped jar）を取得する。
      - name: Download built jars
        uses: actions/download-artifact@v4
        with:
          name: _staging-all-remapped
          path: dist

      - name: Attach jars as release assets
        run: |
          set -euo pipefail
          shopt -s nullglob
          jars=(dist/*.jar)
          if [ ${#jars[@]} -eq 0 ]; then
            echo "::error::No jars found to attach to release $TAG" >&2
            exit 1
          fi
          # 既存の同名 asset があれば上書きする（再実行に備える）
          gh release upload "$TAG" "${jars[@]}" --clobber --repo "$REPO"
          echo "Attached ${#jars[@]} jar(s) to release $TAG"

      - name: Append checksum table to release notes
        run: |
          set -euo pipefail

          marker="<!-- ci:buildReleaseRemapped -->"

          # 既存の release note を取得し、過去に追記したセクション（marker 以降）を除去する。
          # これにより再実行しても表が重複して追記されない。
          body=$(gh release view "$TAG" --repo "$REPO" --json body -q '.body // ""')
          base="${body%%"$marker"*}"

          {
            printf '%s\n' "$base"
            printf '%s\n' "$marker"
            echo "---"
            echo ""
            echo "## \`buildReleaseRemapped\` artifacts"
            echo ""
            echo "| Jar | Size | SHA-256 |"
            echo "| --- | ---: | --- |"
            echo "$CHECKSUMS" \
              | jq -r 'to_entries[] | [.key, (.value.size|tostring), .value.sha256] | @tsv' \
              | while IFS=$'\t' read -r jar size sha; do
                  human=$(numfmt --to=iec-i --suffix=B "$size")
                  url="https://github.com/$REPO/releases/download/$TAG/$jar"
                  echo "| [\`$jar\`]($url) | $human ($size B) | \`$sha\` |"
                done
          } > notes.md

          gh release edit "$TAG" --repo "$REPO" --notes-file notes.md
          echo "Updated release notes for $TAG"

  # 4) jar ごとの SHA-256 / サイズ / artifact リンクを 1 つの表にまとめて summary に出力する。
  summary:
    # release ジョブが staging artifact を読み終えるのを待ってから削除するため needs に含める。
    needs: [build, package, release]
    if: ${{ !cancelled() && needs.build.result == 'success' && needs.package.result == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write # artifact 一覧の取得と staging artifact の削除に必要
      pull-requests: write # PR への sticky comment 投稿に必要
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      RUN_ID: ${{ github.run_id }}
      CHECKSUMS: ${{ needs.build.outputs.checksums }}
    steps:
      - name: Render summary
        run: |
          set -euo pipefail

          # この run の artifact 一覧（name -> id）を取得する
          gh api --paginate \
            "repos/$REPO/actions/runs/$RUN_ID/artifacts?per_page=100" \
            -q '.artifacts[] | [.name, (.id|tostring)] | @tsv' > artifacts.tsv

          declare -A ID
          while IFS=$'\t' read -r name id; do
            ID["$name"]="$id"
          done < artifacts.tsv

          # 表を summary.md に書き出し、step summary と PR コメントの両方で使う。
          {
            echo "## \`buildReleaseRemapped\` artifacts"
            echo ""
            echo "| Jar | Size | SHA-256 | Artifact |"
            echo "| --- | ---: | --- | --- |"
          } > summary.md

          echo "$CHECKSUMS" \
            | jq -r 'to_entries[] | [.key, (.value.size|tostring), .value.sha256] | @tsv' \
            | while IFS=$'\t' read -r jar size sha; do
                artifact="${jar%.jar}"
                id="${ID[$artifact]:-}"
                human=$(numfmt --to=iec-i --suffix=B "$size")
                if [ -n "$id" ]; then
                  link="[Download](https://github.com/$REPO/actions/runs/$RUN_ID/artifacts/$id)"
                else
                  link="_n/a_"
                fi
                echo "| \`$jar\` | $human ($size B) | \`$sha\` | $link |" >> summary.md
              done

          cat summary.md >> "$GITHUB_STEP_SUMMARY"

          # 内部用 staging artifact を削除し、per-file artifact だけ残す
          staging_id="${ID[_staging-all-remapped]:-}"
          if [ -n "$staging_id" ]; then
            echo "Deleting staging artifact (id=$staging_id)"
            gh api -X DELETE "repos/$REPO/actions/artifacts/$staging_id" || true
          fi

      # pull_request の push 時は、同じ表を sticky comment として PR に出力する。
      - name: Post summary as PR comment
        if: ${{ github.event_name == 'pull_request' }}
        uses: marocchino/sticky-pull-request-comment@v3
        with:
          header: buildReleaseRemapped
          path: summary.md
